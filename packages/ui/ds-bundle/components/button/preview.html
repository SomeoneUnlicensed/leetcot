<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Button Component</title>
    <style>
      body {
        font-family: system-ui;
        margin: 20px;
      }
      .variant {
        margin-bottom: 16px;
      }
      button {
        margin-right: 8px;
      }
    </style>
  </head>
  <body>
    <div class="variant">
      <h3>Default</h3>
      <button class="btn btn-default">Click me</button>
    </div>

    <div class="variant">
      <h3>Outline</h3>
      <button class="btn btn-outline">Outline</button>
    </div>

    <div class="variant">
      <h3>Destructive</h3>
      <button class="btn btn-destructive">Delete</button>
    </div>

    <div class="variant">
      <h3>Secondary</h3>
      <button class="btn btn-secondary">Secondary</button>
    </div>

    <div class="variant">
      <h3>Ghost</h3>
      <button class="btn btn-ghost">Ghost</button>
    </div>
  </body>
</html>
