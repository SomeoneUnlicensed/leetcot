name: leetcot

services:
  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev}
      POSTGRES_DB: leetcot
    volumes:
      - leetcot-data:/var/lib/postgresql/data
    # ports:
    #   - 5432:5432
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d leetcot']
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: 'bitnami/redis:latest'
    container_name: leetcot-redis
    restart: always
    environment:
      - ALLOW_EMPTY_PASSWORD=yes
    ports:
      - 6380:6379

  app:
    image: ${LEETCOT_IMAGE:-ghcr.io/someoneunlicensed/leetcot:latest}
    ports:
      - 3002:3000
      - 3001:3001
      - 3003:3003
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD:-dev}@db:5432/leetcot?schema=public
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=${NODE_ENV:-production}
      - CODE_RUNNER_MAX_QUEUE_DEPTH=${CODE_RUNNER_MAX_QUEUE_DEPTH:-20}
      - AUTH_URL=${AUTH_URL:-http://localhost:3002}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3002}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  code-runner:
    image: ${LEETCOT_IMAGE:-ghcr.io/someoneunlicensed/leetcot:latest}
    restart: always
    entrypoint: ['pnpm', '--filter', 'code-runner', 'start']
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp:/tmp
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=${NODE_ENV:-production}
      - CODE_RUNNER_CONCURRENCY=${CODE_RUNNER_CONCURRENCY:-2}
      - CODE_RUNNER_TIMEOUT_MS=${CODE_RUNNER_TIMEOUT_MS:-10000}
      - CODE_RUNNER_MEMORY_LIMIT=${CODE_RUNNER_MEMORY_LIMIT:-128m}
      - CODE_RUNNER_CPU_LIMIT=${CODE_RUNNER_CPU_LIMIT:-0.5}
      - CODE_RUNNER_MAX_OUTPUT_BYTES=${CODE_RUNNER_MAX_OUTPUT_BYTES:-16000}
    depends_on:
      redis:
        condition: service_started

  pgadmin:
    image: dpage/pgadmin4:8
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@leetcot.ru}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-dev}
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: 'False'
    volumes:
      - ./pgadmin/servers.json:/pgadmin4/servers.json
      - pgadmin-data:/var/lib/pgadmin
    ports:
      - 127.0.0.1:5050:80
    depends_on:
      db:
        condition: service_healthy

volumes:
  leetcot-data:
    name: leetcot_leetcot-data
    driver: local
  pgadmin-data:
    name: leetcot_pgadmin-data
    driver: local
