name: leetcot

services:
  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev}
      POSTGRES_DB: leetcot
    volumes:
      - leetcot-data:/var/lib/postgresql/data
    ports:
      - 5432:5432
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d leetcot']
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: 'bitnami/redis:latest'
    container_name: leetcot-redis
    restart: always
    environment:
      - ALLOW_EMPTY_PASSWORD=yes
    ports:
      - 6380:6379

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - 3000:3000
      - 3001:3001
      - 3003:3003
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp:/tmp
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD:-dev}@db:5432/leetcot?schema=public
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=${NODE_ENV:-production}
      - AUTH_TRUST_HOST=true
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  pgadmin:
    image: dpage/pgadmin4:8
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@leetcot.ru}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-dev}
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: 'False'
      PGADMIN_CONFIG_SCRIPT_NAME: '/db'
    volumes:
      - ./pgadmin/servers.json:/pgadmin4/servers.json
      - ./pgadmin/pgpass:/pgpassfile
      - pgadmin-data:/var/lib/pgadmin
    ports:
      - 5050:80
    depends_on:
      db:
        condition: service_healthy

volumes:
  leetcot-data:
    driver: local
  pgadmin-data:
    driver: local
