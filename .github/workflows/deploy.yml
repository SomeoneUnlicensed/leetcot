name: Deploy Production on Release

on:
  release:
    types: [published] # Экшен сработает ТОЛЬКО при нажатии "Publish release" в GitHub

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/leetcot.ru/html
            
            # Скачиваем информацию о новых тегах и изменениях из репы
            git fetch --all --tags
            
            # Принудительно переключаем код на сервере на тег этого релиза (например, v1.0.1)
            git checkout ${{ github.event.release.tag_name }}
            
            # Собираем контейнеры и запускаем (Turborepo сам закэширует зависимости)
            sudo docker compose up -d --build
            
            # Удаляем старые ненужные образы Докера, чтобы не забить диск виртуалки
            sudo docker image prune -f
