name: Deploy Production on Release

on:
  release:
    types: [published]

jobs:
  deploy:
    runs-on: self-hosted # ВОТ ОНО. Никаких SSH-экшенов, Гитхаб отдаст команду твоему серверу.

    steps:
      # Этот экшен сам поймет, какой тег релиза был нажат, и скачает именно его код
      - name: Checkout code
        uses: actions/checkout@v4
        
      # Собираем и поднимаем докер прямо в рабочей папке раннера на сервере
      - name: Build and start Docker containers
        run: |
          sudo docker compose up -d --build
          
      # Сносим старый мусор, чтобы сервер не задохнулся по диску
      - name: Clean up unused Docker images
        run: |
          sudo docker image prune -f
