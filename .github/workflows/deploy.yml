name: Deploy to Production

on:
  push:
    branches:
      - main # Замени на нужную ветку, если релизы идут не из main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/leetcot.ru/html
            
            # Стягиваем последние изменения
            git pull origin main
            
            # Пересобираем и перезапускаем Докер-контейнеры в фоне
            # Turborepo сам закэширует то, что не изменилось
            sudo docker compose up -d --build
            
            # Очищаем старые неиспользуемые образы Докера, чтобы не забить диск
            sudo docker image prune -f
