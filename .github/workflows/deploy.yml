name: Deploy Production on Release

on:
  release:
    types: [published]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Free disk space before build
        run: |
          echo "=== Disk before cleanup ==="
          df -h /
          docker image prune -a -f || true
          docker builder prune -a -f || true
          docker volume prune -f || true
          sudo journalctl --vacuum-size=30M || true
          sudo apt-get clean || true
          echo "=== Disk after cleanup ==="
          df -h /

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy .env file
        run: |
          if [ -f /home/user1/actions-runner/.env ]; then
            cp /home/user1/actions-runner/.env ./.env
          else
            echo "❌ Error: Host .env file not found!"
            exit 1
          fi

      - name: Pull Docker images
        run: docker compose pull

      - name: Build and start containers
        run: docker compose up -d --build --remove-orphans

      - name: Wait for database readiness
        run: sleep 8

      - name: Apply database migrations
        run: docker compose exec -T app pnpm --filter @repo/db exec prisma migrate deploy

      - name: Clean up build artifacts
        if: always()
        run: |
          docker image prune -f || true
          docker builder prune -a -f || true
          echo "=== Disk after deploy ==="
          df -h /
