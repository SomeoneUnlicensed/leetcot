name: Deploy Production on Push

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Copy .env file
        run: cp /home/user1/actions-runner/.env ./.env
        
      - name: Make deploy script executable
        run: chmod +x ./tooling/scripts/deploy.sh

      - name: Run deploy script
        # Передаем email и пароль через секреты GitHub, если они нужны для пересоздания админа при каждом деплое
        # Либо просто запускаем без них, если база уже просидирована
        run: ./tooling/scripts/deploy.sh "${{ secrets.ADMIN_EMAIL }}" "${{ secrets.ADMIN_PASSWORD }}"
