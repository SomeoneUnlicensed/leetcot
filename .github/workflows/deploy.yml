name: Deploy Production on Release

on:
  release:
    types: [published]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Free disk space before build
        run: |
          echo "=== Disk before cleanup ==="
          df -h /mnt/data /
          docker image prune -a -f || true
          docker builder prune -a -f || true
          sudo journalctl --vacuum-size=30M || true
          sudo apt-get clean || true
          echo "=== Disk after cleanup ==="
          df -h /mnt/data /

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy .env file
        run: |
          if [ -f /home/user1/actions-runner/secrets.env ]; then
            cp /home/user1/actions-runner/secrets.env ./.env
          else
            echo "❌ Error: Host secrets.env file not found!"
            exit 1
          fi

      - name: Pull Docker images
        run: docker compose pull

      - name: Pull code runner images
        run: |
          docker pull node:20-alpine
          docker pull python:3.11-alpine

      - name: Build app image
        run: docker compose build app

      - name: Ensure persistent containers are running
        run: docker compose up -d --no-recreate db redis pgadmin

      - name: Wait for database readiness
        run: |
          for i in {1..30}; do
            if docker compose exec -T db pg_isready -U postgres -d leetcot; then
              exit 0
            fi
            sleep 2
          done
          echo "Database did not become ready in time"
          exit 1

      - name: Apply database migrations
        run: docker compose run --rm --no-deps --entrypoint sh app -lc 'pnpm --filter @repo/db exec prisma migrate deploy'

      - name: Deploy new app image
        run: docker compose up -d --force-recreate --no-build app code-runner

      - name: Clean up build artifacts
        if: always()
        run: |
          docker image prune -a -f || true
          docker builder prune -a -f || true
          echo "=== Disk after deploy ==="
          df -h /mnt/data /
