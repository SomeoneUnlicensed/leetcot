name: Deploy Production on Push

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy .env file
        run: |
          if [ -f /home/user1/actions-runner/.env ]; then
            cp /home/user1/actions-runner/.env ./.env
          else
            echo "❌ Error: Host .env file not found!"
            exit 1
          fi

      - name: Pull Docker images
        run: docker compose pull

      - name: Build and start containers
        run: docker compose up -d --build

      - name: Wait for database readiness
        run: sleep 5

      - name: Apply database migrations
        run: docker compose exec -T app npx prisma db push --accept-data-loss

      - name: Seed database with admin credentials
        if: ${{ secrets.ADMIN_EMAIL != '' && secrets.ADMIN_PASSWORD != '' }}
        run: |
          docker compose exec -T app pnpm db:seed -- --email="${{ secrets.ADMIN_EMAIL }}" --password="${{ secrets.ADMIN_PASSWORD }}"

      - name: Clean up unused Docker images
        run: docker image prune -f

